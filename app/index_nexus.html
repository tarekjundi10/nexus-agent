<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus — Research Agent</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #181818;
  --bg2: #141414;
  --sidebar-bg: #111111;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #e8e6e0;
  --text2: rgba(232,230,224,0.55);
  --text3: rgba(232,230,224,0.25);
  --green: #39ff85;
  --green-dim: rgba(57,255,133,0.15);
  --green-border: rgba(57,255,133,0.25);
  --btn-bg: transparent;
  --btn-border: rgba(255,255,255,0.1);
  --btn-text: rgba(232,230,224,0.4);
  --input-border: rgba(255,255,255,0.1);
  --history-hover: rgba(255,255,255,0.04);
}

body.light {
  --bg: #f5f3ee;
  --bg2: #eeece7;
  --sidebar-bg: #ece9e3;
  --border: rgba(0,0,0,0.08);
  --border2: rgba(0,0,0,0.14);
  --text: #1a1a18;
  --text2: rgba(26,26,24,0.55);
  --text3: rgba(26,26,24,0.28);
  --green: #1a8c4e;
  --green-dim: rgba(26,140,78,0.1);
  --green-border: rgba(26,140,78,0.25);
  --btn-bg: transparent;
  --btn-border: rgba(0,0,0,0.12);
  --btn-text: rgba(26,26,24,0.4);
  --input-border: rgba(0,0,0,0.12);
  --history-hover: rgba(0,0,0,0.04);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'IBM Plex Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 32px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  background: var(--bg2);
}

.logo {
  display: flex;
  align-items: baseline;
  gap: 14px;
}

.logo-name {
  font-family: 'Playfair Display', serif;
  font-size: 24px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.3px;
}

.logo-tag {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  color: var(--green);
  letter-spacing: 2.5px;
  text-transform: uppercase;
  border: 1px solid var(--green-border);
  padding: 2px 8px;
}

.topbar-right {
  display: flex;
  align-items: center;
  gap: 20px;
}

.live {
  display: flex;
  align-items: center;
  gap: 7px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
  color: var(--green);
  letter-spacing: 0.5px;
}

.live-dot {
  width: 6px;
  height: 6px;
  background: var(--green);
  border-radius: 50%;
  animation: blink 1.8s infinite;
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.2; }
}

.theme-btn {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  color: var(--btn-text);
  border: 1px solid var(--btn-border);
  padding: 5px 12px;
  cursor: pointer;
  background: var(--btn-bg);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  transition: all 0.15s;
}

.theme-btn:hover {
  color: var(--text);
  border-color: var(--border2);
}

.main {
  display: grid;
  grid-template-columns: 320px 1fr;
  flex: 1;
  overflow: hidden;
}

.sidebar {
  background: var(--sidebar-bg);
  border-right: 1px solid var(--border);
  padding: 28px 22px;
  display: flex;
  flex-direction: column;
  gap: 24px;
  overflow-y: auto;
}

.field-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  color: var(--text3);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 12px;
}

textarea {
  width: 100%;
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--input-border);
  padding: 8px 0 12px;
  color: var(--text);
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 15px;
  font-weight: 300;
  resize: none;
  height: 110px;
  outline: none;
  line-height: 1.7;
  transition: border-color 0.2s;
}

textarea:focus { border-color: var(--green-border); }
textarea::placeholder { color: var(--text3); font-style: italic; }

.run-btn {
  width: 100%;
  padding: 14px;
  background: var(--green);
  border: none;
  color: #111;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  transition: all 0.15s;
}

.run-btn:hover { opacity: 0.88; }
.run-btn:disabled { opacity: 0.3; cursor: not-allowed; }

.sidebar-divider {
  width: 100%;
  height: 1px;
  background: var(--border);
}

.history-item {
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: all 0.15s;
}

.history-item:last-child { border-bottom: none; }
.history-item:hover { padding-left: 4px; }

.history-goal {
  font-size: 13px;
  font-weight: 300;
  color: var(--text2);
  margin-bottom: 3px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.history-meta {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  color: var(--text3);
  letter-spacing: 0.5px;
}

.content {
  display: grid;
  grid-template-rows: 220px 1fr;
  overflow: hidden;
}

.panel {
  padding: 24px 36px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  background: var(--bg);
}

.panel:first-child {
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
}

.panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
  flex-shrink: 0;
}

.panel-status {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  color: var(--green);
  letter-spacing: 2px;
  text-transform: uppercase;
}

.steps-wrap { flex: 1; }

.step {
  display: flex;
  align-items: baseline;
  gap: 14px;
  margin-bottom: 10px;
  animation: stepIn 0.25s ease;
}

@keyframes stepIn {
  from { opacity: 0; transform: translateX(-6px); }
  to { opacity: 1; transform: translateX(0); }
}

.step-num {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
  color: var(--text3);
  min-width: 26px;
  flex-shrink: 0;
}

.step-num.active { color: var(--green); }

.step-text {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 13px;
  color: var(--text2);
  line-height: 1.65;
}

.step-text.active { color: var(--text); }

.empty-state {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 13px;
  color: var(--text3);
  letter-spacing: 0.5px;
  font-style: italic;
}

.report-wrap { flex: 1; }

.report-dateline {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  color: var(--green);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 10px;
}

.report-title {
  font-family: 'Playfair Display', serif;
  font-size: 32px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.2;
  letter-spacing: -0.3px;
  margin-bottom: 18px;
}

.report-meta {
  display: flex;
  align-items: center;
  gap: 14px;
  padding-bottom: 18px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 20px;
}

.report-meta-item {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  color: var(--text3);
  letter-spacing: 0.5px;
}

.report-h2 {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 25px;
  color: var(--green);
  text-transform: uppercase;
  letter-spacing: 2px;
  margin: 28px 0 12px;
}

.report-h3 {
  font-family: 'Playfair Display', serif;
  font-size: 20px;
  font-weight: 700;
  color: var(--text);
  margin: 20px 0 8px;
}

.report-p {
  font-size: 15px;
  font-weight: 300;
  color: var(--text2);
  line-height: 1.9;
  margin-bottom: 8px;
}

.report-li {
  display: flex;
  gap: 12px;
  margin-bottom: 8px;
}

.report-li-dash {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 13px;
  color: var(--green);
  flex-shrink: 0;
  margin-top: 3px;
}

.report-li-text {
  font-size: 15px;
  font-weight: 300;
  color: var(--text2);
  line-height: 1.85;
}

.report-hr {
  border: none;
  border-top: 1px solid var(--border);
  margin: 16px 0;
}

.action-btn {
  padding: 7px 16px;
  background: var(--btn-bg);
  border: 1px solid var(--btn-border);
  color: var(--btn-text);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  cursor: pointer;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  transition: all 0.15s;
}

.action-btn:hover {
  color: var(--green);
  border-color: var(--green-border);
}

.error-msg {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 13px;
  color: #ff6b6b;
  background: rgba(255,107,107,0.07);
  border: 1px solid rgba(255,107,107,0.2);
  padding: 12px 14px;
  margin-top: 10px;
  line-height: 1.6;
}

.fullscreen-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100vw; height: 100vh;
  z-index: 9999;
  background: var(--bg);
  padding: 40px 120px;
  overflow-y: auto;
  flex-direction: column;
}

.fullscreen-overlay.active { display: flex; }

.fullscreen-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 32px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">
    <span class="logo-name">Nexus</span>
    <span class="logo-tag">Research Agent</span>
  </div>
  <div class="topbar-right">
    <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">Light</button>
    <div class="live">
      <div class="live-dot"></div>
      GPT-4o &middot; Tavily
    </div>
  </div>
</div>

<div class="main">
  <div class="sidebar">
    <div>
      <div class="field-label">Research goal</div>
      <textarea id="goalInput" placeholder="What do you want to research?" onkeydown="handleKey(event)"></textarea>
    </div>
    <button class="run-btn" id="runBtn" onclick="startResearch()">Run Agent</button>
    <div class="sidebar-divider"></div>
    <div>
      <div class="field-label">Previous sessions</div>
      <div id="historyList"></div>
    </div>
  </div>

  <div class="content">
    <div class="panel">
      <div class="panel-header">
        <div class="field-label" style="margin-bottom:0">Agent thinking</div>
        <div class="panel-status" id="agentStatus"></div>
      </div>
      <div class="steps-wrap" id="stepsContainer">
        <div class="empty-state">waiting for a research goal</div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-header">
        <div class="field-label" style="margin-bottom:0">Research report</div>
        <div style="display:flex;gap:8px">
          <button class="action-btn" onclick="toggleFullscreen()">Fullscreen</button>
          <button class="action-btn" id="dlBtn" onclick="downloadReport()" style="display:none">Download .docx</button>
        </div>
      </div>
      <div class="report-wrap" id="reportContent">
        <div class="empty-state">report will appear here</div>
      </div>
    </div>
  </div>
</div>

<div class="fullscreen-overlay" id="fsOverlay">
  <div class="fullscreen-header">
    <div class="logo">
      <span class="logo-name">Nexus</span>
      <span class="logo-tag">Research Report</span>
    </div>
    <div style="display:flex;gap:10px">
      <button class="action-btn" onclick="downloadReport()">Download .docx</button>
      <button class="action-btn" onclick="closeFullscreen()">Exit</button>
    </div>
  </div>
  <div id="fsReportContent" style="flex:1"></div>
</div>

<script>
let currentSessionId = null;
let pollInterval = null;
let currentReport = '';
let sessions = [];
let stepCount = 0;

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    startResearch();
  }
}

function toggleTheme() {
  const body = document.body;
  const btn = document.getElementById('themeBtn');
  if (body.classList.contains('light')) {
    body.classList.remove('light');
    btn.textContent = 'Light';
  } else {
    body.classList.add('light');
    btn.textContent = 'Dark';
  }
}

async function startResearch() {
  const goal = document.getElementById('goalInput').value.trim();
  if (!goal) return;

  const btn = document.getElementById('runBtn');
  btn.disabled = true;
  btn.textContent = 'Running...';

  stepCount = 0;
  document.getElementById('stepsContainer').innerHTML = '';
  document.getElementById('reportContent').innerHTML = '<div class="empty-state">synthesizing report...</div>';
  document.getElementById('dlBtn').style.display = 'none';
  document.getElementById('agentStatus').textContent = 'Running';
  currentReport = '';

  const res = await fetch('/research', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ goal })
  });

  const data = await res.json();
  currentSessionId = data.session_id;
  sessions.unshift({ session_id: currentSessionId, goal, status: 'running' });
  renderHistory();

  if (pollInterval) clearInterval(pollInterval);
  pollInterval = setInterval(poll, 1500);
}

async function poll() {
  if (!currentSessionId) return;
  const res = await fetch('/status/' + currentSessionId);
  const data = await res.json();
  renderSteps(data.steps, data.status);

  if (data.status === 'complete') {
    clearInterval(pollInterval);
    document.getElementById('agentStatus').textContent = 'Complete';
    fetchReport();
    updateSessionStatus(currentSessionId, 'complete');
    const btn = document.getElementById('runBtn');
    btn.disabled = false;
    btn.textContent = 'Run Agent';
  }

  if (data.status === 'error') {
    clearInterval(pollInterval);
    document.getElementById('agentStatus').textContent = 'Error';
    document.getElementById('stepsContainer').innerHTML +=
      '<div class="error-msg">' + data.error + '</div>';
    const btn = document.getElementById('runBtn');
    btn.disabled = false;
    btn.textContent = 'Run Agent';
  }
}

function renderSteps(steps, status) {
  const container = document.getElementById('stepsContainer');
  container.innerHTML = '';
  steps.forEach((step, i) => {
    const isLast = i === steps.length - 1;
    const isActive = isLast && status === 'running';
    const num = String(i + 1).padStart(2, '0');
    const div = document.createElement('div');
    div.className = 'step';
    div.innerHTML =
      '<span class="step-num ' + (isActive ? 'active' : '') + '">' + num + '</span>' +
      '<span class="step-text ' + (isActive ? 'active' : '') + '">' + step + '</span>';
    container.appendChild(div);
  });
}

async function fetchReport() {
  const res = await fetch('/report/' + currentSessionId);
  const data = await res.json();
  currentReport = data.report;
  renderReport(data.report, document.getElementById('reportContent'), true);
  document.getElementById('dlBtn').style.display = 'block';
}

function renderReport(md, container, withMeta) {
  const fmt = (text) => text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/(https?:\/\/[^\s<>"]+)/g,
      '<a href="$1" target="_blank" style="color:var(--green);text-decoration:none;border-bottom:1px solid var(--green-border);">$1</a>');

  let html = '';
  const lines = md.split('\n');
  let firstH1 = false;

  lines.forEach(line => {
    if (line.startsWith('# ')) {
      if (!firstH1 && withMeta) {
        html += '<div class="report-dateline">Research Report &middot; ' +
          new Date().toLocaleDateString('en-US', {month:'long', year:'numeric'}) + '</div>';
        html += '<div class="report-title">' + fmt(line.slice(2)) + '</div>';
        html += '<div class="report-meta">' +
          '<span class="report-meta-item">GPT-4o synthesis</span>' +
          '<span class="report-meta-item">&middot;</span>' +
          '<span class="report-meta-item">Tavily web search</span>' +
          '</div>';
        firstH1 = true;
      } else {
        html += '<div class="report-title">' + fmt(line.slice(2)) + '</div>';
      }
    } else if (line.startsWith('## ')) {
      html += '<div class="report-h2">' + fmt(line.slice(3)) + '</div>';
    } else if (line.startsWith('### ')) {
      html += '<div class="report-h3">' + fmt(line.slice(4)) + '</div>';
    } else if (line.startsWith('- ') || line.startsWith('* ')) {
      html += '<div class="report-li"><span class="report-li-dash">&mdash;</span>' +
        '<span class="report-li-text">' + fmt(line.slice(2)) + '</span></div>';
    } else if (/^\d+\.\s/.test(line)) {
      html += '<div class="report-li"><span class="report-li-dash">&mdash;</span>' +
        '<span class="report-li-text">' + fmt(line.replace(/^\d+\.\s/, '')) + '</span></div>';
    } else if (line.trim() === '---') {
      html += '<div class="report-hr"></div>';
    } else if (line.trim()) {
      html += '<div class="report-p">' + fmt(line) + '</div>';
    }
  });

  container.innerHTML = html;
}

function downloadReport() {
  if (!currentSessionId) return;
  window.location.href = '/download/' + currentSessionId;
}

function toggleFullscreen() {
  const overlay = document.getElementById('fsOverlay');
  const fsContent = document.getElementById('fsReportContent');
  renderReport(currentReport, fsContent, true);
  overlay.classList.add('active');
}

function closeFullscreen() {
  document.getElementById('fsOverlay').classList.remove('active');
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeFullscreen();
});

function renderHistory() {
  const list = document.getElementById('historyList');
  list.innerHTML = '';
  sessions.slice(0, 6).forEach(s => {
    const div = document.createElement('div');
    div.className = 'history-item';
    div.innerHTML =
      '<div class="history-goal">' + s.goal + '</div>' +
      '<div class="history-meta">' + s.status + '</div>';
    list.appendChild(div);
  });
}

function updateSessionStatus(id, status) {
  const s = sessions.find(s => s.session_id === id);
  if (s) { s.status = status; renderHistory(); }
}
</script>
</body>
</html>
