<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus Agent</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --bg2: #111118;
  --bg3: #16161f;
  --border: rgba(255,255,255,0.07);
  --text: #e8e8f0;
  --text2: rgba(255,255,255,0.5);
  --text3: rgba(255,255,255,0.25);
  --accent: #6366f1;
  --accent-bg: rgba(99,102,241,0.12);
  --accent-border: rgba(99,102,241,0.25);
  --success: #22c55e;
  --success-bg: rgba(34,197,94,0.12);
  --card-bg: rgba(255,255,255,0.03);
  --card-hover: rgba(255,255,255,0.06);
  --input-bg: rgba(255,255,255,0.04);
  --step-done-bg: rgba(34,197,94,0.12);
  --step-done-text: #22c55e;
  --step-active-bg: rgba(99,102,241,0.12);
  --step-active-text: #6366f1;
  --btn-bg: rgba(255,255,255,0.05);
  --btn-border: rgba(255,255,255,0.1);
  --btn-text: rgba(255,255,255,0.55);
}

body.light {
  --bg: #f4f4f8;
  --bg2: #ebebf0;
  --bg3: #e2e2ea;
  --border: rgba(0,0,0,0.09);
  --text: #111118;
  --text2: rgba(0,0,0,0.5);
  --text3: rgba(0,0,0,0.28);
  --accent: #4f52d6;
  --accent-bg: rgba(79,82,214,0.1);
  --accent-border: rgba(79,82,214,0.22);
  --success: #16a34a;
  --success-bg: rgba(22,163,74,0.1);
  --card-bg: rgba(0,0,0,0.03);
  --card-hover: rgba(0,0,0,0.06);
  --input-bg: rgba(0,0,0,0.04);
  --step-done-bg: rgba(22,163,74,0.1);
  --step-done-text: #16a34a;
  --step-active-bg: rgba(79,82,214,0.1);
  --step-active-text: #4f52d6;
  --btn-bg: rgba(0,0,0,0.04);
  --btn-border: rgba(0,0,0,0.1);
  --btn-text: rgba(0,0,0,0.5);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
}

.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 28px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  background: var(--bg);
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo-icon {
  width: 30px;
  height: 30px;
  background: var(--accent);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: 700;
  color: #fff;
  flex-shrink: 0;
}

.logo-text {
  font-size: 16px;
  font-weight: 700;
  letter-spacing: -0.3px;
  color: var(--text);
}

.logo-badge {
  font-size: 10px;
  font-family: 'JetBrains Mono', monospace;
  color: var(--accent);
  background: var(--accent-bg);
  padding: 2px 8px;
  border-radius: 4px;
  border: 1px solid var(--accent-border);
}

.topbar-right {
  display: flex;
  align-items: center;
  gap: 14px;
}

.theme-btn {
  padding: 5px 12px;
  background: var(--btn-bg);
  border: 1px solid var(--btn-border);
  border-radius: 6px;
  color: var(--btn-text);
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  cursor: pointer;
  letter-spacing: 0.8px;
  transition: all 0.15s;
}

.theme-btn:hover {
  background: var(--card-hover);
  color: var(--text);
}

.status-label {
  font-size: 12px;
  color: var(--success);
  font-family: 'JetBrains Mono', monospace;
  display: flex;
  align-items: center;
  gap: 6px;
}

.dot {
  width: 7px;
  height: 7px;
  background: var(--success);
  border-radius: 50%;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

.main {
  display: grid;
  grid-template-columns: 340px 1fr;
  flex: 1;
  overflow: hidden;
}

.sidebar {
  border-right: 1px solid var(--border);
  padding: 22px 18px;
  display: flex;
  flex-direction: column;
  gap: 18px;
  overflow-y: auto;
  background: var(--bg);
}

.label {
  font-size: 10px;
  font-family: 'JetBrains Mono', monospace;
  color: var(--text3);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: 10px;
}

textarea {
  width: 100%;
  background: var(--input-bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 14px;
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  resize: none;
  height: 110px;
  outline: none;
  transition: border-color 0.2s;
  line-height: 1.6;
}

textarea:focus { border-color: var(--accent-border); }
textarea::placeholder { color: var(--text3); }

.run-btn {
  width: 100%;
  padding: 13px;
  background: var(--accent);
  border: none;
  border-radius: 10px;
  color: #fff;
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: 0.3px;
}

.run-btn:hover { opacity: 0.9; transform: translateY(-1px); }
.run-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

.history-item {
  padding: 10px 12px;
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.15s;
  margin-bottom: 6px;
}

.history-item:hover {
  background: var(--card-hover);
}

.history-goal {
  font-size: 12px;
  color: var(--text);
  margin-bottom: 3px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.history-meta {
  font-size: 10px;
  font-family: 'JetBrains Mono', monospace;
  color: var(--text3);
}

.content {
  display: grid;
  grid-template-rows: 1fr 2fr;
  overflow: hidden;
  background: var(--bg);
}

.panel {
  padding: 22px 26px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  background: var(--bg);
}

.panel:first-child {
  border-bottom: 1px solid var(--border);
}

.panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
  flex-shrink: 0;
}

.panel-status {
  font-size: 10px;
  font-family: 'JetBrains Mono', monospace;
  color: var(--accent);
  letter-spacing: 1px;
}

.step {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  margin-bottom: 8px;
  animation: fadeUp 0.25s ease;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: translateY(0); }
}

.step-icon {
  width: 20px;
  height: 20px;
  border-radius: 5px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 9px;
  font-weight: 600;
  flex-shrink: 0;
  margin-top: 2px;
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: 0;
}

.step-icon.done {
  background: var(--step-done-bg);
  color: var(--step-done-text);
}

.step-icon.active {
  background: var(--step-active-bg);
  color: var(--step-active-text);
}

.step-text {
  font-size: 13px;
  color: var(--text2);
  font-family: 'JetBrains Mono', monospace;
  line-height: 1.6;
  padding-top: 2px;
}

.step-text.active { color: var(--text); }

.empty-state {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text3);
  font-size: 12px;
  font-family: 'JetBrains Mono', monospace;
}

.report-wrap { flex: 1; }

.report-title {
  font-size: 20px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 4px;
  letter-spacing: -0.4px;
  line-height: 1.3;
}

.report-h2 {
  font-size: 10px;
  font-weight: 600;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin: 18px 0 8px;
  font-family: 'JetBrains Mono', monospace;
}

.report-h3 {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  margin: 12px 0 6px;
}

.report-p {
  font-size: 14px;
  color: var(--text2);
  line-height: 1.85;
  margin-bottom: 6px;
}

.report-li {
  font-size: 14px;
  color: var(--text2);
  line-height: 1.8;
  padding-left: 14px;
  position: relative;
  margin-bottom: 4px;
}

.report-li::before {
  content: '';
  position: absolute;
  left: 0;
  top: 10px;
  width: 4px;
  height: 4px;
  background: var(--accent);
  border-radius: 50%;
}

.report-hr {
  border: none;
  border-top: 1px solid var(--border);
  margin: 14px 0;
}

.dl-btn {
  padding: 6px 13px;
  background: var(--btn-bg);
  border: 1px solid var(--btn-border);
  border-radius: 7px;
  color: var(--btn-text);
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: 0.5px;
}

.dl-btn:hover {
  background: var(--card-hover);
  color: var(--text);
}
.fs-btn {
  padding: 6px 13px;
  background: var(--btn-bg);
  border: 1px solid var(--btn-border);
  border-radius: 7px;
  color: var(--btn-text);
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: 0.5px;
}

.fs-btn:hover {
  background: var(--card-hover);
  color: var(--text);
}

.fullscreen-overlay {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  z-index: 9999;
  background: var(--bg);
  padding: 32px 48px;
  overflow-y: auto;
  flex-direction: column;
}

.fullscreen-overlay.active {
  display: flex;
}

.fullscreen-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
  flex-shrink: 0;
}
.error-msg {
  font-size: 12px;
  font-family: 'JetBrains Mono', monospace;
  color: #f87171;
  background: rgba(248,113,113,0.08);
  border: 1px solid rgba(248,113,113,0.2);
  border-radius: 8px;
  padding: 12px;
  margin-top: 10px;
}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">
    <div class="logo-icon">N</div>
    <span class="logo-text">Nexus</span>
    <span class="logo-badge">AGENT v1.0</span>
  </div>
  <div class="topbar-right">
    <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">LIGHT</button>
    <div class="status-label">
      <div class="dot"></div>
      GPT-4o &middot; Tavily Search
    </div>
  </div>
</div>

<div class="main">
  <div class="sidebar">
    <div>
      <div class="label">Research Goal</div>
      <textarea id="goalInput" placeholder="e.g. What are the latest AI agent frameworks in 2025?"></textarea>
    </div>
    <button class="run-btn" id="runBtn" onclick="startResearch()">Run Research Agent</button>
    <div>
      <div class="label">Recent Sessions</div>
      <div id="historyList"></div>
    </div>
  </div>

  <div class="content">
    <div class="panel">
      <div class="panel-header" id="reportPanel">
        <div class="label" style="margin-bottom:0">Agent Thinking</div>
        <div class="panel-status" id="agentStatus"></div>
      </div>
      <div id="stepsContainer">
        <div class="empty-state" id="emptyThinking">waiting for research goal</div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-header">
        <div class="label" style="margin-bottom:0">Research Report</div>
        <div style="display:flex;gap:8px;align-items:center">
  <button class="fs-btn" id="fsBtn" onclick="toggleFullscreen()">FULLSCREEN</button>
  <button class="dl-btn" id="dlBtn" onclick="downloadReport()" style="display:none">Download .md</button>
</div>
      </div>
      <div class="report-wrap" id="reportContent">
        <div class="empty-state">report will appear here</div>
      </div>
    </div>
  </div>
</div>

<script>
let currentSessionId = null;
let pollInterval = null;
let currentReport = '';
let sessions = [];

function toggleTheme() {
  const body = document.body;
  const btn = document.getElementById('themeBtn');
  if (body.classList.contains('light')) {
    body.classList.remove('light');
    btn.textContent = 'LIGHT';
  } else {
    body.classList.add('light');
    btn.textContent = 'DARK';
  }
}

async function startResearch() {
  const goal = document.getElementById('goalInput').value.trim();
  if (!goal) return;

  const btn = document.getElementById('runBtn');
  btn.disabled = true;
  btn.textContent = 'Running...';

  document.getElementById('emptyThinking') && (document.getElementById('emptyThinking').style.display = 'none');
  document.getElementById('stepsContainer').innerHTML = '';
  document.getElementById('reportContent').innerHTML = '<div class="empty-state">generating report...</div>';
  document.getElementById('dlBtn').style.display = 'none';
  document.getElementById('agentStatus').textContent = 'RUNNING';
  currentReport = '';

  const res = await fetch('/research', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ goal })
  });

  const data = await res.json();
  currentSessionId = data.session_id;
  sessions.unshift({ session_id: currentSessionId, goal, status: 'running' });
  renderHistory();

  if (pollInterval) clearInterval(pollInterval);
  pollInterval = setInterval(poll, 1500);
}

async function poll() {
  if (!currentSessionId) return;
  const res = await fetch('/status/' + currentSessionId);
  const data = await res.json();

  renderSteps(data.steps, data.status);

  if (data.status === 'complete') {
    clearInterval(pollInterval);
    document.getElementById('agentStatus').textContent = 'COMPLETE';
    fetchReport();
    updateSessionStatus(currentSessionId, 'complete');
    const btn = document.getElementById('runBtn');
    btn.disabled = false;
    btn.textContent = 'Run Research Agent';
  }

  if (data.status === 'error') {
    clearInterval(pollInterval);
    document.getElementById('agentStatus').textContent = 'ERROR';
    document.getElementById('stepsContainer').innerHTML += '<div class="error-msg">' + data.error + '</div>';
    const btn = document.getElementById('runBtn');
    btn.disabled = false;
    btn.textContent = 'Run Research Agent';
  }
}

function renderSteps(steps, status) {
  const container = document.getElementById('stepsContainer');
  container.innerHTML = '';
  steps.forEach((step, i) => {
    const isLast = i === steps.length - 1;
    const isActive = isLast && status === 'running';
    const div = document.createElement('div');
    div.className = 'step';
    div.innerHTML =
      '<div class="step-icon ' + (isActive ? 'active' : 'done') + '">' +
      (isActive ? '...' : 'ok') +
      '</div>' +
      '<div class="step-text ' + (isActive ? 'active' : '') + '">' + step + '</div>';
    container.appendChild(div);
  });
}

async function fetchReport() {
  const res = await fetch('/report/' + currentSessionId);
  const data = await res.json();
  currentReport = data.report;
  renderReport(data.report);
  document.getElementById('dlBtn').style.display = 'block';
}

function renderReport(md) {
  const container = document.getElementById('reportContent');
  let html = '';
  const lines = md.split('\n');

  const fmt = (text) => {
    text = text
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.*?)\*/g, '<em>$1</em>')
      .replace(/(https?:\/\/[^\s<>"]+)/g,
        '<a href="$1" target="_blank" style="color:var(--accent);text-decoration:none;border-bottom:1px solid var(--accent-border);">$1</a>');
    return text;
  };

  lines.forEach(line => {
    if (line.startsWith('# ')) {
      html += '<div class="report-title">' + fmt(line.slice(2)) + '</div>';
    } else if (line.startsWith('## ')) {
      html += '<div class="report-h2">' + fmt(line.slice(3)) + '</div>';
    } else if (line.startsWith('### ')) {
      html += '<div class="report-h3">' + fmt(line.slice(4)) + '</div>';
    } else if (line.startsWith('- ') || line.startsWith('* ')) {
      html += '<div class="report-li">' + fmt(line.slice(2)) + '</div>';
    } else if (/^\d+\.\s/.test(line)) {
      html += '<div class="report-li">' + fmt(line.replace(/^\d+\.\s/, '')) + '</div>';
    } else if (line.trim() === '---' || line.trim() === '***') {
      html += '<div class="report-hr"></div>';
    } else if (line.trim()) {
      html += '<div class="report-p">' + fmt(line) + '</div>';
    }
  });

  container.innerHTML = html;
}

function downloadReport() {
  const blob = new Blob([currentReport], { type: 'text/markdown' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'nexus_report.md';
  a.click();
  URL.revokeObjectURL(url);
}

function renderHistory() {
  const list = document.getElementById('historyList');
  list.innerHTML = '';
  sessions.slice(0, 5).forEach(s => {
    const div = document.createElement('div');
    div.className = 'history-item';
    div.innerHTML =
      '<div class="history-goal">' + s.goal + '</div>' +
      '<div class="history-meta">' + s.status.toUpperCase() + '</div>';
    list.appendChild(div);
  });
}

function toggleFullscreen() {
  const overlay = document.getElementById('fsOverlay');
  const fsContent = document.getElementById('fsReportContent');
  const mainContent = document.getElementById('reportContent');
  fsContent.innerHTML = mainContent.innerHTML;
  overlay.classList.add('active');
}

function closeFullscreen() {
  document.getElementById('fsOverlay').classList.remove('active');
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeFullscreen();
});

function updateSessionStatus(id, status) {
  const s = sessions.find(s => s.session_id === id);
  if (s) { s.status = status; renderHistory(); }
}
</script>
<div class="fullscreen-overlay" id="fsOverlay">
  <div class="fullscreen-header">
    <div class="label" style="margin-bottom:0">Research Report</div>
    <div style="display:flex;gap:8px">
      <button class="dl-btn" onclick="downloadReport()">Download .md</button>
      <button class="fs-btn" onclick="closeFullscreen()">EXIT FULLSCREEN</button>
    </div>
  </div>
  <div id="fsReportContent" style="flex:1"></div>
</div>
</body>
</html>
